<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MapTap Battle: Harshit vs Abhed vs Garima</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* Material 3 Dark Theme Palette */
    :root {
      --m3-surface: #141218;
      --m3-surface-container: #211F26;
      --m3-surface-container-high: #2B2930;
      --m3-on-surface: #E6E0E9;
      --m3-on-surface-variant: #CAC4D0;
      --m3-outline-variant: #49454F;
      
      /* Chic Material You Accents */
      --color-harshit: #D0BCFF; /* Macaron Lavender */
      --color-abhed: #FFB4AB;   /* Soft Peach/Coral */
      --color-garima: #93D7A5;  /* Sage Mint */
    }

    body { 
      /* system-ui triggers Google Sans on Pixel devices */
      font-family: system-ui, -apple-system, sans-serif; 
      background: var(--m3-surface); 
      color: var(--m3-on-surface); 
      padding: 16px; 
      margin: 0; 
      min-height: 100vh;
      /* Prevent pull-to-refresh on mobile if heavily scrolling charts */
      overscroll-behavior-y: none; 
    }

    /* M3 Expressive Typography */
    h1 { 
      text-align: left; 
      font-size: 2.25rem;
      font-weight: 400;
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin: 1rem 0 2rem 8px;
      color: var(--m3-on-surface);
    }
    h1 span { 
      display: block; 
      font-size: 3rem; 
      font-weight: 700;
      background: linear-gradient(90deg, var(--color-harshit), var(--color-garima));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .dashboard { display: flex; flex-direction: column; gap: 16px; }
    
    /* M3 Cards */
    .summary-container { 
      display: grid; 
      grid-template-columns: 1fr; /* Stacks vertically on mobile by default */
      gap: 12px; 
    }
    
    .card { 
      background: var(--m3-surface-container);
      padding: 20px 24px; 
      border-radius: 28px; /* Classic M3 large border radius */
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; bottom: 0; width: 8px;
      background: var(--player-color);
    }

    .card h3 { 
      margin: 0; 
      font-size: 1.5rem; 
      font-weight: 500; 
      color: var(--player-color); 
    }
    .card .stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
    }
    .card .stat-box { display: flex; flex-direction: column; }
    .card p { margin: 0; color: var(--m3-on-surface-variant); font-size: 0.85rem; }
    .card b { color: var(--m3-on-surface); font-size: 1.2rem; font-weight: 600; }

    /* Chart Containers */
    .chart-wrapper { 
      background: var(--m3-surface-container); 
      padding: 16px; 
      border-radius: 28px; 
      position: relative; 
      height: 320px; /* Perfect height for modern mobile screens */
      width: 100%;
      box-sizing: border-box;
    }

    /* M3 Loader */
    #loading { text-align: center; padding: 50px; font-size: 1.1rem; color: var(--m3-on-surface-variant); }
    
    /* Tablet & Desktop Escalation */
    @media (min-width: 600px) {
      body { padding: 24px; }
      .summary-container { grid-template-columns: repeat(3, 1fr); gap: 16px; }
      h1 { text-align: center; margin: 2rem 0 3rem 0; }
      h1 span { display: inline; }
      .dashboard { grid-template-columns: 1fr 1fr; display: grid; gap: 24px; }
      .chart-wrapper { height: 400px; }
      .chart-wrapper.full-width { grid-column: 1 / -1; }
      .summary-container { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>
  <h1>MapTap <span>Live Battle</span></h1>
  
  <div id="loading">Syncing scores...</div>
  
  <div id="content" class="dashboard" style="display:none">
    <div id="summary" class="summary-container"></div>
    
    <div class="chart-wrapper full-width">
      <canvas id="lineChart"></canvas>
    </div>
    <div class="chart-wrapper">
      <canvas id="avgChart"></canvas>
    </div>
    <div class="chart-wrapper">
      <canvas id="gameChart"></canvas>
    </div>
  </div>

<script>
// Chic Material You colors
const colors = { 
  Harshit: '#D0BCFF', // Lavender
  Abhed: '#FFB4AB',   // Peach
  Garima: '#93D7A5'   // Mint
};

// Apply M3 typography & grid styles to Chart.js globally
Chart.defaults.color = '#CAC4D0';
Chart.defaults.font.family = "system-ui, -apple-system, sans-serif";
Chart.defaults.font.size = 13;
Chart.defaults.scale.grid.color = '#49454F'; // M3 Outline Variant
Chart.defaults.scale.grid.drawBorder = false;

// M3 Expressive Tooltip & Legend
const commonOptions = {
  responsive: true,
  maintainAspectRatio: false,
  layout: { padding: { top: 10 } },
  plugins: {
    legend: {
      position: 'bottom',
      labels: { usePointStyle: true, pointStyle: 'circle', padding: 20, font: { weight: '500' } }
    },
    tooltip: {
      backgroundColor: '#2B2930', // Surface Container High
      titleColor: '#E6E0E9',
      bodyColor: '#CAC4D0',
      padding: 16,
      cornerRadius: 16, // M3 characteristic rounded tooltip
      boxPadding: 8,
      usePointStyle: true,
      borderColor: 'rgba(255,255,255,0.05)',
      borderWidth: 1
    }
  }
};

async function loadData() {
  try {
    const res = await fetch('./maptap_scores.json?v=' + new Date().getTime());
    if(!res.ok) throw new Error('Could not load JSON');
    const data = await res.json();

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'flex';
    // For desktop grid application
    if(window.innerWidth > 600) document.getElementById('content').style.display = 'grid';

    renderSummary(data.summary);
    renderCharts(data);
  } catch(err) {
    document.getElementById('loading').innerHTML = `⚠️ Error syncing data: ${err.message}`;
  }
}

function renderSummary(summary) {
  const container = document.getElementById('summary');
  container.innerHTML = ''; 
  Object.keys(summary).forEach(player => {
    const s = summary[player];
    container.innerHTML += `
      <div class="card" style="--player-color: ${colors[player]}">
        <h3>${player}</h3>
        <div class="stats">
          <div class="stat-box">
            <p>Best Score</p>
            <b>${s.best}</b>
          </div>
          <div class="stat-box" style="text-align: center;">
            <p>Daily Avg</p>
            <b>${s.average}</b>
          </div>
          <div class="stat-box" style="text-align: right;">
            <p>Days Played</p>
            <b>${s.days_played}</b>
          </div>
        </div>
      </div>`;
  });
}

function renderCharts(data) {
  const allDates = [...new Set(Object.values(data.players).flat().map(d => d.date))].sort();

  // 1. Line Chart (Thick, smooth lines - expressive M3 style)
  const lineDatasets = Object.keys(data.players).map(player => {
    const totals = allDates.map(date => data.players[player].find(d => d.date === date)?.total || null);
    return { 
      label: player, 
      data: totals, 
      borderColor: colors[player], 
      backgroundColor: colors[player] + '22',
      borderWidth: 4, // Chunky expressive lines
      pointBackgroundColor: '#141218',
      pointBorderColor: colors[player],
      pointBorderWidth: 3,
      pointRadius: 5,
      pointHoverRadius: 8,
      tension: 0.5 // Extra smooth curves
    };
  });

  new Chart(document.getElementById('lineChart'), {
    type: 'line',
    data: { labels: allDates.map(d => d.substring(5)), datasets: lineDatasets }, // Trim year for mobile readability
    options: {
      ...commonOptions,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        ...commonOptions.plugins,
        title: { display: true, align: 'start', text: 'Total Scores Over Time', color: '#E6E0E9', font: { size: 18, weight: '400' }, padding: { bottom: 20 } }
      }
    }
  });

  // 2. Average Scores Bar Chart (Pill shaped bars)
  new Chart(document.getElementById('avgChart'), {
    type: 'bar',
    data: { 
      labels: Object.keys(data.summary), 
      datasets: [{ 
        label: 'Overall Average', 
        data: Object.values(data.summary).map(s => s.average), 
        backgroundColor: Object.values(colors),
        borderRadius: 16, // M3 pill-shaped bars
        borderSkipped: false,
        barThickness: 32 // Thicker, friendlier bars
      }] 
    },
    options: { 
      ...commonOptions,
      plugins: {
        ...commonOptions.plugins,
        legend: { display: false },
        title: { display: true, align: 'start', text: 'Overall Average', color: '#E6E0E9', font: { size: 18, weight: '400' } }
      },
      scales: {
        x: { grid: { display: false } }
      }
    }
  });

  // 3. Average per Game Bar Chart
  const gameAvgs = {};
  Object.keys(data.players).forEach(player => {
    const games = [1,2,3,4,5].map(i => {
      const arr = data.players[player].map(d => d['g'+i]).filter(val => val !== undefined);
      return arr.length ? Math.round(arr.reduce((a,b)=>a+b)/arr.length) : 0;
    });
    gameAvgs[player] = games;
  });

  new Chart(document.getElementById('gameChart'), {
    type: 'bar',
    data: { 
      labels: ['G1','G2','G3','G4','G5'], 
      datasets: Object.keys(gameAvgs).map(p => ({ 
        label: p, 
        data: gameAvgs[p], 
        backgroundColor: colors[p],
        borderRadius: 8,
        borderSkipped: false
      })) 
    },
    options: { 
      ...commonOptions,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        ...commonOptions.plugins,
        title: { display: true, align: 'start', text: 'Avg per Round', color: '#E6E0E9', font: { size: 18, weight: '400' } }
      },
      scales: {
        x: { grid: { display: false } }
      }
    }
  });
}

loadData();
</script>
</body>
</html>
