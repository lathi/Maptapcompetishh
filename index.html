<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MapTap Battle: Harshit vs Abhed vs Garima</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #020617;
      --card-bg: rgba(30, 41, 59, 0.5);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #38bdf8;
      --border: rgba(255, 255, 255, 0.08);
    }

    body { 
      font-family: 'Inter', system-ui, sans-serif; 
      background: linear-gradient(135deg, #0f172a 0%, #020617 100%); 
      color: var(--text-main); 
      padding: 2rem; 
      margin: 0; 
      min-height: 100vh;
    }

    h1 { 
      text-align: center; 
      color: var(--text-main); 
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 2rem;
    }
    h1 span { color: var(--accent); }

    /* Glassmorphism styling */
    .glass {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    .dashboard { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 2rem; }
    
    /* Summary Cards */
    .summary-container { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    .card { 
      padding: 1.5rem; 
      text-align: center; 
      flex: 1; 
      min-width: 220px;
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
      border-color: rgba(56, 189, 248, 0.4);
    }
    .card h3 { margin: 0 0 10px 0; font-size: 1.4rem; color: var(--text-main); }
    .card p { margin: 8px 0; color: var(--text-muted); font-size: 0.95rem; }
    .card b { color: var(--text-main); font-weight: 600; }

    /* Chart Grid Layout */
    .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 1.5rem; }
    .chart-wrapper { padding: 1.5rem; position: relative; height: 350px; }
    .chart-wrapper.full-width { grid-column: 1 / -1; height: 400px; }

    #loading { text-align: center; padding: 50px; font-size: 1.2rem; color: var(--accent); }
    
    /* Responsive tweaks */
    @media (max-width: 600px) {
      .charts-grid { grid-template-columns: 1fr; }
      body { padding: 1rem; }
    }
  </style>
</head>
<body>
  <h1>🏆 MapTap <span>Battle</span></h1>
  
  <div id="loading">Loading live scores...</div>
  
  <div id="content" class="dashboard" style="display:none">
    <div id="summary" class="summary-container"></div>
    
    <div class="charts-grid">
      <div class="chart-wrapper glass full-width">
        <canvas id="lineChart"></canvas>
      </div>
      <div class="chart-wrapper glass">
        <canvas id="avgChart"></canvas>
      </div>
      <div class="chart-wrapper glass">
        <canvas id="gameChart"></canvas>
      </div>
    </div>
  </div>

<script>
// Sleek vibrant colors for the modern dark theme
const colors = { Harshit: '#38bdf8', Abhed: '#f43f5e', Garima: '#10b981' };

// Global Chart.js defaults for modern look
Chart.defaults.color = '#94a3b8';
Chart.defaults.font.family = "'Inter', sans-serif";
Chart.defaults.scale.grid.color = 'rgba(255, 255, 255, 0.05)';

// Reusable custom tooltip and legend config
const commonOptions = {
  responsive: true,
  maintainAspectRatio: false,
  plugins: {
    legend: {
      labels: { usePointStyle: true, boxWidth: 8, padding: 20 }
    },
    tooltip: {
      backgroundColor: 'rgba(15, 23, 42, 0.9)',
      titleColor: '#f8fafc',
      bodyColor: '#cbd5e1',
      borderColor: 'rgba(255,255,255,0.1)',
      borderWidth: 1,
      padding: 12,
      cornerRadius: 8,
      boxPadding: 6
    }
  }
};

async function loadData() {
  try {
    const res = await fetch('./maptap_scores.json?v=' + new Date().getTime());
    if(!res.ok) throw new Error('Could not load JSON');
    const data = await res.json();

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'flex';

    renderSummary(data.summary);
    renderCharts(data);
  } catch(err) {
    document.getElementById('loading').innerHTML = `⚠️ Error loading data: ${err.message}<br><small>Make sure you are running a local server (e.g., Live Server).</small>`;
  }
}

function renderSummary(summary) {
  const container = document.getElementById('summary');
  container.innerHTML = ''; 
  Object.keys(summary).forEach(player => {
    const s = summary[player];
    container.innerHTML += `
      <div class="card glass" style="border-top: 4px solid ${colors[player]}">
        <h3 style="color: ${colors[player]}">${player}</h3>
        <p><b>Best Score:</b> ${s.best}</p>
        <p><b>Daily Avg:</b> ${s.average}</p>
        <p><b>Days Played:</b> ${s.days_played}</p>
      </div>`;
  });
}

function renderCharts(data) {
  const allDates = [...new Set(Object.values(data.players).flat().map(d => d.date))].sort();

  // 1. Interactive Line Chart (Area style)
  const lineDatasets = Object.keys(data.players).map(player => {
    const totals = allDates.map(date => data.players[player].find(d => d.date === date)?.total || null);
    return { 
      label: player, 
      data: totals, 
      borderColor: colors[player], 
      backgroundColor: colors[player] + '1A', // Transparent fill
      borderWidth: 3,
      pointBackgroundColor: '#0f172a',
      pointBorderColor: colors[player],
      pointBorderWidth: 2,
      pointRadius: 4,
      pointHoverRadius: 6,
      fill: true, // Creates the modern Area-chart look
      tension: 0.4 // Smooth curves
    };
  });

  new Chart(document.getElementById('lineChart'), {
    type: 'line',
    data: { labels: allDates, datasets: lineDatasets },
    options: {
      ...commonOptions,
      interaction: {
        mode: 'index', // Hovering over a date shows all 3 players at once
        intersect: false,
      },
      plugins: {
        ...commonOptions.plugins,
        title: { display: true, text: 'Daily Total Scores Over Time', color: '#f8fafc', font: { size: 16, weight: '600' }, padding: { bottom: 20 } }
      }
    }
  });

  // 2. Average Scores Bar Chart
  new Chart(document.getElementById('avgChart'), {
    type: 'bar',
    data: { 
      labels: Object.keys(data.summary), 
      datasets: [{ 
        label: 'Overall Average', 
        data: Object.values(data.summary).map(s => s.average), 
        backgroundColor: Object.values(colors).map(c => c + 'CC'),
        hoverBackgroundColor: Object.values(colors),
        borderRadius: 6 // Modern rounded bars
      }] 
    },
    options: { 
      ...commonOptions,
      plugins: {
        ...commonOptions.plugins,
        legend: { display: false }, // Hide legend since colors map to players
        title: { display: true, text: 'Overall Average Scores', color: '#f8fafc', font: { size: 16, weight: '600' } }
      }
    }
  });

  // 3. Average per Game Bar Chart
  const gameAvgs = {};
  Object.keys(data.players).forEach(player => {
    const games = [1,2,3,4,5].map(i => {
      const arr = data.players[player].map(d => d['g'+i]).filter(val => val !== undefined);
      return arr.length ? Math.round(arr.reduce((a,b)=>a+b)/arr.length) : 0;
    });
    gameAvgs[player] = games;
  });

  new Chart(document.getElementById('gameChart'), {
    type: 'bar',
    data: { 
      labels: ['Game 1','Game 2','Game 3','Game 4','Game 5'], 
      datasets: Object.keys(gameAvgs).map(p => ({ 
        label: p, 
        data: gameAvgs[p], 
        backgroundColor: colors[p] + 'E6',
        hoverBackgroundColor: colors[p],
        borderRadius: 4
      })) 
    },
    options: { 
      ...commonOptions,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        ...commonOptions.plugins,
        title: { display: true, text: 'Average Score per Round', color: '#f8fafc', font: { size: 16, weight: '600' } }
      }
    }
  });
}

loadData();
</script>
</body>
</html>
