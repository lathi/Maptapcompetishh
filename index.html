
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MapTap Battle: Harshit vs Abhed vs Garima</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; }
    h1 { text-align: center; color: #38bdf8; }
   .charts { display: grid; gap: 30px; max-width: 1000px; margin: auto; }
    canvas { background: #1e293b; border-radius: 12px; padding: 15px; }
    #summary { max-width: 800px; margin: 30px auto; display: flex; justify-content: space-around; text-align: center; }
   .card { background: #1e293b; padding: 15px; border-radius: 12px; width: 30%; }
   .card h3 { margin: 5px 0; }
  </style>
</head>
<body>
  <h1>🏆 MapTap 3-Way Battle</h1>

  <div id="summary"></div>

  <div class="charts">
    <canvas id="lineChart"></canvas>
    <canvas id="avgChart"></canvas>
    <canvas id="gameHeatmap"></canvas>
  </div>

<script>
async function loadData() {
  const res = await fetch('maptap_scores.json');
  const data = await res.json();
  renderCharts(data);
  renderSummary(data.summary);
}

function renderSummary(summary) {
  const container = document.getElementById('summary');
  Object.keys(summary).forEach(player => {
    const s = summary[player];
    container.innerHTML += `
      <div class="card">
        <h3>${player}</h3>
        <p><b>Best:</b> ${s.best}</p>
        <p><b>Avg:</b> ${s.average}</p>
        <p><b>Days:</b> ${s.days_played}</p>
      </div>
    `;
  });
}

function renderCharts(data) {
  // Prepare line chart data
  const allDates = [...new Set(Object.values(data.players).flat().map(d => d.date))].sort();

  const colors = {
    Harshit: 'rgb(59, 130, 246)',
    Abhed: 'rgb(239, 68, 68)',
    Garima: 'rgb(16, 185, 129)'
  };

  const datasets = Object.keys(data.players).map(player => {
    const playerData = data.players[player];
    const totals = allDates.map(date => {
      const day = playerData.find(d => d.date === date);
      return day? day.total : null;
    });
    return {
      label: player,
      data: totals,
      borderColor: colors[player],
      backgroundColor: colors[player] + '33',
      tension: 0.3,
      fill: false
    };
  });

  // Line Chart: Daily Totals
  new Chart(document.getElementById('lineChart'), {
    type: 'line',
    data: { labels: allDates, datasets },
    options: {
      responsive: true,
      plugins: { title: { display: true, text: 'Daily Total Scores', color: '#e2e8f0' } },
      scales: { x: { ticks: { color: '#94a3b8' } }, y: { ticks: { color: '#94a3b8' } } }
    }
  });

  // Bar Chart: Averages
  new Chart(document.getElementById('avgChart'), {
    type: 'bar',
    data: {
      labels: Object.keys(data.summary),
      datasets: [{
        label: 'Average Score',
        data: Object.values(data.summary).map(s => s.average),
        backgroundColor: [colors.Harshit, colors.Abhed, colors.Garima]
      }]
    },
    options: {
      plugins: { title: { display: true, text: 'Average Scores', color: '#e2e8f0' } },
      scales: { x: { ticks: { color: '#94a3b8' } }, y: { ticks: { color: '#94a3b8' } }
    }
  });

  // Heatmap: Avg per Game
  const gameAvgs = {};
  Object.keys(data.players).forEach(player => {
    const games = {g1: [], g2: [], g3: [], g4: [], g5: []};
    data.players[player].forEach(d => {
      games.g1.push(d.g1); games.g2.push(d.g2); games.g3.push(d.g3);
      games.g4.push(d.g4); games.g5.push(d.g5);
    });
    gameAvgs[player] = Object.values(games).map(arr => Math.round(arr.reduce((a,b)=>a+b)/arr.length));
  });

  new Chart(document.getElementById('gameHeatmap'), {
    type: 'bar',
    data: {
      labels: ['Game 1', 'Game 2', 'Game 3', 'Game 4', 'Game 5'],
      datasets: Object.keys(gameAvgs).map(player => ({
        label: player,
        data: gameAvgs[player],
        backgroundColor: colors[player]
      }))
    },
    options: {
      plugins: { title: { display: true, text: 'Average Score per Game', color: '#e2e8f0' } },
      scales: { x: { ticks: { color: '#94a3b8' } }, y: { ticks: { color: '#94a3b8' } }
    }
  });
}

loadData();
</script>
</body>
</html>
